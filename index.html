  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  .scroll{flex:1;overflow-y:auto;padding-bottom:92px}

  /* Auth */
  .auth{min-height:100vh;background:linear-gradient(160deg,var(--green-900),var(--green-700));display:flex;flex-direction:column;padding:30px 26px;position:relative;overflow:hidden}
  .auth::before{content:"";position:absolute;top:-120px;right:-90px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(194,208,52,.22),transparent 70%)}
  .auth-logo{display:flex;justify-content:center;margin:8px 0 4px;position:relative}
  .auth-logo img{width:92px;height:92px;border-radius:22px;box-shadow:0 14px 40px rgba(0,0,0,.35)}
  .auth h1{color:#fff;font-size:21px;margin:18px 0 2px;font-weight:800;text-align:center;position:relative}
  .auth .sub{color:var(--lime-soft);font-size:13.5px;margin:0 0 18px;text-align:center;position:relative}
  .auth-card{background:#fff;border-radius:20px;padding:20px;position:relative;box-shadow:var(--shadow-lg)}
  .auth-foot{position:relative;text-align:center;color:rgba(255,255,255,.85);font-size:13px;margin-top:16px}
  .auth-foot a{color:var(--lime);font-weight:700;text-decoration:underline}
  .demo{position:relative;margin-top:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:12px 14px;color:rgba(255,255,255,.85);font-size:11.5px;line-height:1.6}
  .demo b{color:#fff}
  .demo .dline{display:flex;justify-content:space-between;gap:8px;padding:2px 0;cursor:pointer}
  .demo .dline:active{color:var(--lime)}
  .err{background:#fbe6e2;color:#b23a2a;font-size:12.5px;padding:10px 12px;border-radius:10px;margin-bottom:12px;font-weight:600}

  /* Topbar */
  .topbar{background:var(--green-900);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:30}
  .topbar img.knot{width:32px;height:32px}
  .topbar .title{font-weight:700;font-size:15px;flex:1;line-height:1.15}
  .topbar .title small{display:block;font-weight:500;font-size:11px;color:rgba(255,255,255,.6)}
  .topbar .role-pill{font-size:10.5px;background:var(--lime);color:var(--green-900);padding:3px 9px;border-radius:20px;font-weight:700}
  .topbar .switch{color:rgba(255,255,255,.8);font-size:12px;border:1px solid rgba(255,255,255,.25);padding:5px 10px;border-radius:20px}
  .topbar .switch.alt{color:var(--green-900);background:var(--lime);border-color:var(--lime);font-weight:700}

  /* Bottom nav */
  .bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:440px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;box-shadow:0 -4px 18px rgba(0,0,0,.05)}
  .navbtn{flex:1;padding:9px 2px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;position:relative}
  .navbtn .ic{font-size:20px;line-height:1}
  .navbtn.active{color:var(--green-700)}
  .navbtn .badge{position:absolute;top:4px;left:50%;margin-left:6px;background:var(--red);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:700}

  .page-head{padding:18px 18px 6px}
  .page-head h2{margin:0;font-size:20px;font-weight:800;color:var(--green-900)}
  .page-head p{margin:4px 0 0;color:var(--muted);font-size:13px}
  .back-head{display:flex;align-items:center;gap:10px;padding:16px 16px 4px}
  .back-head button{font-size:22px;color:var(--green-800);width:34px;height:34px;border-radius:10px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
  .back-head h2{margin:0;font-size:19px;font-weight:800;color:var(--green-900)}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 16px;overflow:hidden}
  .card-pad{padding:16px}
  .section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 18px 2px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--lime);color:var(--green-900);font-weight:700;font-size:15px;padding:14px;border-radius:13px;width:100%;transition:.15s}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:#fff;color:var(--green-700);border:1.5px solid var(--line)}
  .btn.dark{background:var(--green-700);color:#fff}
  .btn.red{background:#fdeceA;color:var(--red)}
  .btn.sm{padding:9px 14px;font-size:13px;width:auto;border-radius:10px}
  .btn:disabled{opacity:.45}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--green-800);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fafbf9;color:var(--ink);outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green-600);background:#fff}
  .field textarea{min-height:74px;resize:vertical}
  .req-mark{color:var(--red)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

  .seg{display:flex;background:#eef2eb;border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--green-800);box-shadow:0 1px 4px rgba(0,0,0,.08)}

  .chk{display:flex;gap:11px;align-items:flex-start;background:#f6f8f3;border:1.5px solid var(--line);border-radius:12px;padding:13px;cursor:pointer}
  .chk.on{border-color:var(--green-600);background:#eef6ec}
  .chk .box{width:22px;height:22px;border-radius:7px;border:2px solid #c3ccbf;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;margin-top:1px}
  .chk.on .box{background:var(--green-600);border-color:var(--green-600)}
  .chk .txt{font-size:12.5px;line-height:1.4;color:var(--ink)}
  .chk .txt a{color:var(--green-700);font-weight:700;text-decoration:underline}

  .status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px}
  .st-pend{background:#fdf2dd;color:#9a6b15}
  .st-aprov{background:#e4f4e6;color:#2c7a3f}
  .st-reprov{background:#fbe6e2;color:#b23a2a}
  .st-feita{background:#e6eef7;color:#2f5d86}

  .req-card{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin:11px 16px;padding:15px;border-left:4px solid var(--line)}
  .req-card.pend{border-left-color:var(--amber)}
  .req-card.aprov{border-left-color:#3aa15a}
  .req-card.reprov{border-left-color:var(--red)}
  .req-card.feita{border-left-color:var(--blue)}
  .req-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
  .req-top .who{font-weight:800;font-size:15px;color:var(--green-900)}
  .req-top .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .req-line{font-size:13px;color:var(--ink);margin:3px 0;display:flex;gap:7px}
  .req-line b{color:var(--green-800);font-weight:700;min-width:74px;display:inline-block}
  .note-box{background:#f6f8f3;border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--muted);margin-top:9px}
  .note-box.reject{background:#fbe6e2;color:#9a3527}

  .empty{text-align:center;padding:46px 30px;color:var(--muted)}
  .empty .ic{font-size:46px;display:block;margin-bottom:12px;opacity:.5}
  .empty p{font-size:14px;margin:0}

  .ann{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin:11px 16px;overflow:hidden}
  .ann .ann-bar{height:5px}
  .ann .ann-img{width:100%;max-height:170px;object-fit:cover;display:block}
  .ann-body{padding:15px}
  .ann .a-title{font-weight:800;font-size:16px;color:var(--green-900);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ann .a-date{font-size:11.5px;color:var(--muted);margin:3px 0 9px}
  .ann .a-text{font-size:13.5px;line-height:1.5;color:#374039}
  .tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .tag.urg{background:#fbe6e2;color:#b23a2a}.tag.info{background:#e6eef7;color:#2f5d86}.tag.event{background:#f1ecfb;color:#6b4fb0}

  .area-card{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin:11px 16px;padding:14px;display:flex;gap:13px;align-items:flex-start}
  .area-ic{width:46px;height:46px;border-radius:12px;background:var(--lime-soft);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
  .area-info{flex:1;min-width:0}
  .area-info .an{font-weight:700;font-size:15px;color:var(--green-900)}
  .area-info .at{font-size:12px;color:var(--muted);margin-top:2px}
  .photo-strip{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .photo-strip img{width:62px;height:62px;border-radius:9px;object-fit:cover;border:1px solid var(--line);cursor:pointer}
  .fresh{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:#e4f4e6;color:#2c7a3f;white-space:nowrap}
  .fresh.stale{background:#fdf2dd;color:#9a6b15}

  .modal-bg{position:fixed;inset:0;background:rgba(20,40,35,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.8,.2,1)}
  .modal.center{border-radius:22px;max-width:380px;margin:0 18px;align-self:center}
  @keyframes up{from{transform:translateY(60px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .modal-grab{width:40px;height:4px;background:#dde3d9;border-radius:3px;margin:10px auto 4px}
  .modal-head{padding:6px 20px 14px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:18px;color:var(--green-900);font-weight:800}
  .modal-body{padding:18px 20px}
  .rule-h{font-weight:800;color:var(--green-800);font-size:13px;margin:14px 0 4px}
  .rule-h:first-child{margin-top:0}
  .rule-p{font-size:13px;line-height:1.5;color:#374039;margin:0 0 4px}

  .popup-card{text-align:center;padding:8px 22px 24px}
  .popup-ic{width:60px;height:60px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:30px;margin:6px auto 12px}
  .popup-card h3{margin:0 0 4px;color:var(--green-900);font-size:19px}
  .popup-card .pd{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .popup-card .pimg{width:100%;border-radius:12px;margin-bottom:12px;max-height:160px;object-fit:cover}
  .popup-card .pt{font-size:14px;line-height:1.5;color:#374039;text-align:left;margin-bottom:18px}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:90;display:flex;align-items:center;justify-content:center;animation:fade .2s}
  .lightbox img{max-width:94%;max-height:84%;border-radius:10px}
  .lightbox .lx{position:absolute;top:18px;right:20px;color:#fff;font-size:30px;font-weight:300}

  .qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
  .qr-item{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:14px;text-align:center}
  .qr-item .qbox{display:flex;justify-content:center;margin-bottom:8px}
  .qr-item .qbox img,.qr-item .qbox canvas{border-radius:6px}
  .qr-item .qn{font-size:12.5px;font-weight:700;color:var(--green-900)}
  .qr-item .qc{font-size:10px;color:var(--muted);margin-top:1px;font-family:monospace}

  .toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--green-900);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:var(--shadow-lg);animation:up .25s;display:flex;align-items:center;gap:8px;white-space:nowrap}

  .stat-row{display:flex;gap:11px;padding:0 16px;margin-top:4px}
  .stat{flex:1;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:14px 12px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:var(--green-800)}
  .stat .l{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
  .stat.amber .n{color:var(--amber)}.stat.green .n{color:#3aa15a}

  .add-photo{border:1.5px dashed #c3ccbf;border-radius:11px;padding:18px;text-align:center;color:var(--muted);font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:6px;background:#fafbf9}
  .add-photo .ic{font-size:26px}
  .photo-prev{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .photo-prev .pp{position:relative;width:70px;height:70px}
  .photo-prev img{width:70px;height:70px;border-radius:10px;object-fit:cover;border:1px solid var(--line)}
  .photo-prev .x{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:800}

  .hint{font-size:11.5px;color:var(--muted);background:#eef6ec;border-radius:10px;padding:10px 12px;margin:0 16px 12px;line-height:1.45;display:flex;gap:8px}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .svc-block{background:#f6f8f3;border-radius:12px;padding:12px;margin-bottom:10px;position:relative}
  .svc-block .rm{position:absolute;top:8px;right:10px;color:var(--red);font-size:12px;font-weight:700}

  /* packages */
  .pkg-card{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin:11px 16px;padding:15px;border-left:4px solid var(--amber)}
  .pkg-card.done{border-left-color:var(--blue)}
  .code-pill{display:inline-flex;align-items:center;gap:8px;background:var(--green-900);color:#fff;font-weight:800;font-size:22px;letter-spacing:5px;padding:10px 18px;border-radius:12px;font-family:monospace}
  .code-wrap{text-align:center;background:#f6f8f3;border-radius:12px;padding:14px;margin-top:10px}
  .code-wrap .cl{font-size:11.5px;color:var(--muted);margin-bottom:7px;font-weight:600}
  .otp{letter-spacing:8px;text-align:center;font-size:24px!important;font-weight:800;font-family:monospace}
  .pill-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px}

  /* areas manager */
  .area-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:13px;box-shadow:var(--shadow);margin:9px 16px;padding:12px 14px}
  .area-row .nm{flex:1;font-weight:700;color:var(--green-900);font-size:14.5px}
  .area-row .cd{font-size:10.5px;color:var(--muted);font-family:monospace}
  .emoji-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .emoji-pick button{width:38px;height:38px;border-radius:9px;background:#f0f3ee;font-size:19px}
  .emoji-pick button.on{background:var(--lime-soft);outline:2px solid var(--green-600)}
  .staff-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:13px;box-shadow:var(--shadow);margin:9px 16px;padding:12px 14px}
  .staff-row .av{width:40px;height:40px;border-radius:50%;background:var(--green-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
  .role-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;background:#eef2eb;color:var(--green-800);text-transform:uppercase}
</style>
</head>

const API_BASE = "https://script.google.com/macros/s/AKfycbz6_fdV7ZgxHrAsKGpWqGt2dh-9J3LG_26B11X5u7auBgIUPUTJf95GS8299zamuVPvtg/exec"; // cole aqui a URL do Web App do Google Apps Script
async function loadData(fb){
  if(API_BASE){try{const r=await fetch(API_BASE+"?action=load");const j=await r.json();if(j&&j.data)return j.data;}catch(e){}}
  try{if(window.storage){const r=await window.storage.get('tp_data');if(r&&r.value)return JSON.parse(r.value);}}catch(e){}
  return fb;
}
async function saveData(d){
  if(API_BASE){try{await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save',data:d})});}catch(e){}}
  try{if(window.storage){await window.storage.set('tp_data',JSON.stringify(d));}}catch(e){}
}
/* Sobe a foto para o Drive (via backend) e devolve o link.
   Sem backend ou em caso de erro, devolve a própria imagem (fallback local). */
async function pushPhoto(dataUrl,folder,name){
  if(!API_BASE||typeof dataUrl!=='string'||dataUrl.indexOf('data:')!==0) return dataUrl;
  try{
    const r=await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'uploadPhoto',dataUrl,folder,name})});
    const j=await r.json();
    if(j&&j.ok&&j.url) return j.url;
  }catch(e){}
  return dataUrl;
}
async function pushPhotos(list,folder,name){const out=[];for(let i=0;i<list.length;i++)out.push(await pushPhoto(list[i],folder,name+'_'+i));return out}

function Knot({size=32}){return <img className="knot" src={KNOT} style={{width:size,height:size,display:'block'}} alt=""/>}
function QR({text,size=96}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){ref.current.innerHTML='';try{new QRCode(ref.current,{text,width:size,height:size,colorDark:'#164736',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}}},[text,size]);
  return <div ref={ref}></div>;
}
function todayStr(){return new Date().toLocaleDateString('pt-BR')}
function nowStr(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function genCode(){return String(Math.floor(1000+Math.random()*9000))}
function slug(s){return s.toLowerCase().normalize('NFD').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}
function digits(s){return (s||'').replace(/\D/g,'')}
function fmtCpf(s){const d=digits(s).slice(0,11);if(d.length>9)return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');if(d.length>6)return d.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');if(d.length>3)return d.replace(/(\d{3})(\d{1,3})/,'$1.$2');return d}
function fmtDate(s){const d=digits(s).slice(0,8);if(d.length>4)return d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4);if(d.length>2)return d.slice(0,2)+'/'+d.slice(2);return d}
function fmtTime(s){const d=digits(s).slice(0,4);if(d.length>2)return d.slice(0,2)+':'+d.slice(2);return d}
function fmtPhone(s){const d=digits(s).slice(0,11);if(d.length>7)return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);if(d.length>2)return '('+d.slice(0,2)+') '+d.slice(2);if(d.length>0)return '('+d;return d}
function fmtDoc(s){const d=digits(s).slice(0,14);if(d.length<=11){if(d.length>9)return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');if(d.length>6)return d.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');if(d.length>3)return d.replace(/(\d{3})(\d{1,3})/,'$1.$2');return d}return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{1,2})/,'$1.$2.$3/$4-$5')}
function validDoc(s){const n=digits(s).length;return n===11||n===14}
function validPhone(s){return digits(s).length===11}
function parseDate(s){const m=digits(s);if(m.length!==8)return null;const dd=+m.slice(0,2),mm=+m.slice(2,4),yy=+m.slice(4,8);const dt=new Date(yy,mm-1,dd);if(dt.getDate()!==dd||dt.getMonth()!==mm-1||yy<2024)return null;return dt}
function parseDateTime(s,h){const dt=parseDate(s);if(!dt)return null;const hm=(h||'').match(/^(\d{1,2}):(\d{2})$/);if(!hm)return null;const H=+hm[1],M=+hm[2];if(H>23||M>59)return null;dt.setHours(H,M,0,0);return dt}
const DAYS=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
function validateMove(f){
  const dt=parseDateTime(f.data,f.hora);
  if(!dt)return 'Informe data (dd/mm/aaaa) e horário (HH:MM) válidos.';
  if(dt.getDay()===0)return 'Mudanças são permitidas de segunda a sábado. O dia escolhido é domingo.';
  const mins=dt.getHours()*60+dt.getMinutes();
  if(mins<480||mins>1080)return 'Horário permitido para mudança: das 08h00 às 18h00.';
  if(dt.getTime()-Date.now()<86400000)return 'A mudança deve ser solicitada com no mínimo 24h de antecedência.';
  return null;
}
function validateWork(f){
  const di=parseDate(f.dataInicio),df=parseDate(f.dataFim);
  if(!di||!df)return 'Informe datas de início e fim válidas (dd/mm/aaaa).';
  if(di.getDay()===0||di.getDay()===6)return 'Obras são permitidas de segunda a sexta. A data de início cai em '+DAYS[di.getDay()]+'.';
  if(df.getDay()===0||df.getDay()===6)return 'Obras são permitidas de segunda a sexta. A data de fim cai em '+DAYS[df.getDay()]+'.';
  const today=new Date();today.setHours(0,0,0,0);
  if(di<today)return 'A data de início não pode estar no passado.';
  if(df<di)return 'A data de fim não pode ser anterior à de início.';
  return null;
}

  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const l=msg.length,k=((56-(l+1)%64)+64)%64,total=l+1+k+8,buf=new Uint8Array(total);
  buf.set(msg,0);buf[l]=0x80;const dv=new DataView(buf.buffer);const bitLen=l*8;
  dv.setUint32(total-4,bitLen>>>0,false);dv.setUint32(total-8,Math.floor(bitLen/0x100000000),false);
  const w=new Uint32Array(64),rotr=(n,x)=>(x>>>n)|(x<<(32-n));
  for(let off=0;off<total;off+=64){
    for(let i=0;i<16;i++)w[i]=dv.getUint32(off+i*4,false);
    for(let i=16;i<64;i++){const s0=rotr(7,w[i-15])^rotr(18,w[i-15])^(w[i-15]>>>3),s1=rotr(17,w[i-2])^rotr(19,w[i-2])^(w[i-2]>>>10);w[i]=(w[i-16]+s0+w[i-7]+s1)|0}
    let a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for(let i=0;i<64;i++){const S1=rotr(6,e)^rotr(11,e)^rotr(25,e),ch=(e&f)^((~e)&g),t1=(h+S1+ch+K[i]+w[i])|0,S0=rotr(2,a)^rotr(13,a)^rotr(22,a),maj=(a&b)^(a&c)^(b&c),t2=(S0+maj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0}
    H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
  }
  const out=new Uint8Array(32),odv=new DataView(out.buffer);for(let i=0;i<8;i++)odv.setUint32(i*4,H[i]>>>0,false);return out;

function sha256hex(str){return toHex(sha256bytes(utf8(str)))}

function App(){
  const [user,setUser]=useState(null);
  const [data,setData]=useState(seed);
  const [toast,setToast]=useState(null);
  const [lightbox,setLightbox]=useState(null);
  const [ready,setReady]=useState(false);
  const [asMorador,setAsMorador]=useState(false);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2200)};

  useEffect(()=>{(async()=>{const d=await loadData(seed);if(d){if(!d.users)d.users=seed.users;if(!d.areas)d.areas=seed.areas;if(!d.packages)d.packages=seed.packages;if(!d.tickets)d.tickets=seed.tickets;if(!d.visitors)d.visitors=seed.visitors;if(!d.documents)d.documents=seed.documents;if(!d.acks)d.acks=[];d.users=migrateUsers(d.users);setData(d);}setReady(true)})()},[]);
  useEffect(()=>{if(ready)saveData(data)},[data,ready]);

  const shared={data,setData,toast:showToast,openImg:setLightbox};
  if(!user) return <><Auth data={data} setData={setData} onLogin={setUser}/><Lightbox src={lightbox} onClose={()=>setLightbox(null)}/></>;
  const canSwitch=user.role==='sindico'||user.role==='subsindico';
  const view=(canSwitch&&asMorador)?'morador':(user.role==='subsindico'?'sindico':user.role);

  const logout=()=>{setAsMorador(false);setUser(null)};
  return (
    <div className="app-shell">

  );
}

/* ===== AUTH ===== */
function Auth({data,setData,onLogin}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const login=()=>{
    const u=data.users.find(x=>x.email.toLowerCase()===email.trim().toLowerCase());
    if(!u||!verifyPass(u,pass)){setErr('E-mail ou senha incorretos.');return}
    if(u.status==='pendente'){setErr('Seu cadastro está em análise pelo síndico. Você poderá entrar após a aprovação.');return}
    if(u.status==='rejeitado'){setErr('Seu cadastro não foi aprovado. Procure o síndico.');return}
    onLogin(u);
  };
  if(mode==='register') return <Register data={data} setData={setData} onDone={onLogin} back={()=>setMode('login')}/>;
  if(mode==='forgot') return <ForgotPassword data={data} setData={setData} onDone={onLogin} back={()=>setMode('login')}/>;
  return (
    <div className="app-shell"><div className="auth">
      <div className="auth-logo"><img src={LOCKUP} alt="Torre Passaré"/></div>
      <h1>App do Condomínio</h1>
      <p className="sub">Entre com seu e-mail e senha</p>
      <div className="auth-card">
        {err && <div className="err">{err}</div>}
        <div className="field"><label>E-mail</label><input type="email" placeholder="voce@email.com" value={email} onChange={e=>{setEmail(e.target.value);setErr('')}}/></div>
        <div className="field"><label>Senha</label><input type="password" placeholder="••••••••" value={pass} onChange={e=>{setPass(e.target.value);setErr('')}}/></div>
        <button className="btn" onClick={login}>Entrar</button>
        <div style={{textAlign:'center',marginTop:12}}><a style={{color:'var(--green-700)',fontWeight:700,fontSize:13,textDecoration:'underline'}} onClick={()=>setMode('forgot')}>Esqueci minha senha</a></div>
      </div>
      <div className="auth-foot">É morador e ainda não tem conta?<br/><a onClick={()=>setMode('register')}>Criar minha conta</a></div>
    </div></div>
  );
}
function Register({data,setData,onDone,back}){
  const [f,setF]=useState({name:'',torre:'',apt:'',cpf:'',email:'',pass:'',pass2:''});
  const [err,setErr]=useState('');const [done,setDone]=useState(false);
  const set=k=>e=>{setF({...f,[k]:e.target.value});setErr('')};
  const submit=()=>{
    if(!f.name||!f.torre||!f.apt||!f.cpf||!f.email||!f.pass){setErr('Preencha todos os campos.');return}
    if(digits(f.cpf).length!==11){setErr('Informe um CPF válido (11 dígitos).');return}
    if(f.pass.length<6){setErr('A senha deve ter ao menos 6 caracteres.');return}
    if(f.pass!==f.pass2){setErr('As senhas não conferem.');return}
    if(data.users.some(u=>u.email.toLowerCase()===f.email.trim().toLowerCase())){setErr('Já existe uma conta com este e-mail.');return}
    if(data.users.some(u=>u.cpf&&digits(u.cpf)===digits(f.cpf))){setErr('Já existe uma conta com este CPF.');return}
    const salt=makeSalt();const u={id:'u'+Date.now(),name:f.name,role:'morador',apt:f.apt,torre:f.torre,cpf:fmtCpf(f.cpf),email:f.email.trim(),salt,hash:deriveHash(f.pass,salt),status:'pendente'};
    setData(d=>({...d,users:[...d.users,u]}));
    setDone(true);
  };
  if(done) return (
    <div className="app-shell"><div className="auth">
      <div className="auth-logo"><img src={LOCKUP} alt=""/></div>
      <div className="auth-card" style={{marginTop:20,textAlign:'center'}}>
        <div className="popup-ic" style={{margin:'4px auto 14px'}}>⏳</div>
        <h3 style={{margin:'0 0 8px',color:'var(--green-900)',fontSize:19}}>Cadastro enviado!</h3>
        <p style={{fontSize:14,color:'#374039',lineHeight:1.5,marginBottom:18}}>Seu cadastro foi enviado para <b>aprovação do síndico</b>. Assim que for aprovado, você poderá entrar com seu e-mail e senha.</p>
        <button className="btn" onClick={back}>Voltar ao login</button>
      </div>
    </div></div>
  );
  return (
    <div className="app-shell"><div className="auth">
      <div className="auth-logo"><img src={LOCKUP} alt=""/></div>
      <h1>Criar conta de morador</h1>
      <p className="sub">Seu acesso passa por aprovação do síndico</p>
      <div className="auth-card">
        {err && <div className="err">{err}</div>}
        <div className="field"><label>Nome completo</label><input value={f.name} onChange={set('name')} placeholder="Seu nome"/></div>
        <div className="row2">
          <div className="field"><label>Torre</label><input value={f.torre} onChange={set('torre')} placeholder="1"/></div>
          <div className="field"><label>Apartamento</label><input value={f.apt} onChange={set('apt')} placeholder="304"/></div>
        </div>
        <div className="field"><label>CPF</label><input inputMode="numeric" value={f.cpf} onChange={e=>{setF({...f,cpf:fmtCpf(e.target.value)});setErr('')}} placeholder="000.000.000-00"/></div>
        <div className="field"><label>E-mail</label><input type="email" value={f.email} onChange={set('email')} placeholder="voce@email.com"/></div>
        <div className="field"><label>Senha</label><input type="password" value={f.pass} onChange={set('pass')} placeholder="mínimo 6 caracteres"/></div>
        <div className="field"><label>Confirmar senha</label><input type="password" value={f.pass2} onChange={set('pass2')} placeholder="repita a senha"/></div>
        <button className="btn" onClick={submit}>Enviar cadastro para aprovação</button>
        <button className="btn ghost" style={{marginTop:10}} onClick={back}>Voltar ao login</button>
      </div>
    </div></div>
  );
}
function ForgotPassword({data,setData,onDone,back}){
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState('');const [cpf,setCpf]=useState('');const [matched,setMatched]=useState(null);
  const [pass,setPass]=useState('');const [pass2,setPass2]=useState('');const [err,setErr]=useState('');
  const validate=()=>{
    const u=data.users.find(x=>x.email.toLowerCase()===email.trim().toLowerCase());
    if(!u){setErr('Não encontramos uma conta com este e-mail.');return}
    if(!u.cpf||digits(u.cpf)!==digits(cpf)){setErr('O CPF não confere com o cadastro deste e-mail.');return}
    setMatched(u);setErr('');setStep(2);
  };
  const reset=()=>{
    if(pass.length<6){setErr('A senha deve ter ao menos 6 caracteres.');return}
    if(pass!==pass2){setErr('As senhas não conferem.');return}
    const salt=makeSalt();const updated={...matched,salt,hash:deriveHash(pass,salt)};delete updated.pass;
    setData(d=>({...d,users:d.users.map(u=>u.id===matched.id?updated:u)}));
    onDone(updated);
  };
  return (
    <div className="app-shell"><div className="auth">
      <div className="auth-logo"><img src={LOCKUP} alt=""/></div>
      <h1>Recuperar acesso</h1>
      <p className="sub">{step===1?'Confirme sua identidade':'Defina uma nova senha'}</p>
      <div className="auth-card">
        {err && <div className="err">{err}</div>}
        {step===1 ? <>
          <div className="field"><label>E-mail do cadastro</label><input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr('')}} placeholder="voce@email.com"/></div>
          <div className="field"><label>CPF do cadastro</label><input inputMode="numeric" value={cpf} onChange={e=>{setCpf(fmtCpf(e.target.value));setErr('')}} placeholder="000.000.000-00"/></div>
          <button className="btn" onClick={validate}>Validar identidade</button>
        </> : <>
          <div className="hint" style={{margin:'0 0 14px'}}>✓ Identidade confirmada: <b style={{marginLeft:4}}>{matched.name}</b></div>
          <div className="field"><label>Nova senha</label><input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('')}} placeholder="mínimo 6 caracteres"/></div>
          <div className="field"><label>Confirmar nova senha</label><input type="password" value={pass2} onChange={e=>{setPass2(e.target.value);setErr('')}} placeholder="repita a senha"/></div>
          <button className="btn" onClick={reset}>Salvar nova senha e entrar</button>
        </>}
        <button className="btn ghost" style={{marginTop:10}} onClick={back}>Voltar ao login</button>
      </div>
      <div className="auth-foot" style={{fontSize:12}}>Não lembra o e-mail ou CPF do cadastro?<br/>Procure o síndico para redefinir seu acesso.</div>
    </div></div>
  );
}

function Morador({data,setData,toast,openImg,me,back,switchBtn}){

  const newAnn=(data.announcements.length&&!ackedIds.has(data.announcements[0].id))?data.announcements[0]:null;
  const ack=()=>{if(!newAnn)return;setData(d=>({...d,acks:[...(d.acks||[]),{userId:me.id,annId:newAnn.id,at:nowStr()}]}))};
  const myPkgs=data.packages.filter(p=>p.apt===me.apt&&p.torre===me.torre);
  const pendPkg=myPkgs.filter(p=>p.status==='aguardando').length;

  return (
    <>

      <div className="txt">Li e <b>concordo com o Termo de Ciência e Responsabilidade</b> e as regras do Regimento Interno aplicáveis à mudança. <a onClick={e=>{e.stopPropagation();setRules(true)}}>Ver regras</a></div></div></div>

function WorkForm({me,onCancel,onSubmit}){
  const [f,setF]=useState({tipoObra:'',dataInicio:'',dataFim:''});
  const [svcs,setSvcs]=useState([{servico:'',prestador:'',doc:'',tel:'',executores:[{name:'',cpf:''}]}]);
  const [agreed,setAgreed]=useState(false);const [rules,setRules]=useState(false);const [err,setErr]=useState('');
  const set=k=>e=>{setF({...f,[k]:e.target.value});setErr('')};
  const setSvc=(i,k)=>e=>{const c=[...svcs];let v=e.target.value;if(k==='doc')v=fmtDoc(v);if(k==='tel')v=fmtPhone(v);c[i][k]=v;setSvcs(c);setErr('')};
  const setExec=(i,j,k)=>e=>{const c=[...svcs];c[i].executores[j][k]=k==='cpf'?fmtCpf(e.target.value):e.target.value;setSvcs(c);setErr('')};
  const addExec=i=>{const c=[...svcs];c[i].executores.push({name:'',cpf:''});setSvcs(c)};
  const rmExec=(i,j)=>{const c=[...svcs];c[i].executores=c[i].executores.filter((_,x)=>x!==j);setSvcs(c)};
  const submit=()=>{
    const ve=validateWork(f);if(ve){setErr(ve);return}
    for(const s of svcs){
      if(!s.servico.trim()||!s.prestador.trim()){setErr('Preencha o serviço e o prestador de cada item.');return}
      if(!validDoc(s.doc)){setErr('Documento do prestador inválido. CPF deve ter 11 dígitos e CNPJ 14.');return}
      if(!validPhone(s.tel)){setErr('Telefone inválido. Use DDD + número (11 dígitos).');return}
      const execs=s.executores.filter(x=>x.name.trim()&&digits(x.cpf).length===11);
      if(execs.length===0){setErr('Informe ao menos um executor (PF) com nome e CPF (11 dígitos) por prestador.');return}
    }
    if(!agreed){setErr('É necessário concordar com as regras.');return}
    const clean=svcs.map(s=>({...s,executores:s.executores.filter(x=>x.name.trim())}));
    onSubmit({id:Date.now(),kind:'work',apt:me.apt,torre:me.torre,solicitante:me.name,tipoObra:f.tipoObra,dataInicio:f.dataInicio,dataFim:f.dataFim,servicos:clean,nome:me.name,cpf:me.cpf||'—',agreed:true,status:'pendente',note:'',rejectReason:'',realizada:null,createdAt:todayStr()});
  };
  return (<><div className="page-head"><h2>🔨 Obra / Reforma</h2><p>Apartamento {me.apt} · Torre {me.torre}</p></div>
    <div className="card"><div className="card-pad">
      <div className="field"><label>Tipo de obra</label><input placeholder="Ex: reforma de banheiro" value={f.tipoObra} onChange={set('tipoObra')}/></div>
      <div className="row2"><div className="field"><label>Início</label><input inputMode="numeric" placeholder="dd/mm/aaaa" value={f.dataInicio} onChange={e=>{setF({...f,dataInicio:fmtDate(e.target.value)});setErr('')}}/></div><div className="field"><label>Fim</label><input inputMode="numeric" placeholder="dd/mm/aaaa" value={f.dataFim} onChange={e=>{setF({...f,dataFim:fmtDate(e.target.value)});setErr('')}}/></div></div>
      <div className="divider"></div>
      <label style={{fontSize:12.5,fontWeight:700,color:'var(--green-800)',display:'block',marginBottom:8}}>Serviços e prestadores</label>
      {svcs.map((s,i)=>(<div key={i} className="svc-block">{svcs.length>1 && <button className="rm" onClick={()=>setSvcs(svcs.filter((_,j)=>j!==i))}>remover</button>}
        <div className="field" style={{marginBottom:8}}><input placeholder="Serviço (ex: hidráulica)" value={s.servico} onChange={setSvc(i,'servico')}/></div>
        <div className="field" style={{marginBottom:8}}><input placeholder="Prestador / empresa" value={s.prestador} onChange={setSvc(i,'prestador')}/></div>
        <div className="row2"><div className="field" style={{marginBottom:8}}><input inputMode="numeric" placeholder="CPF (11) ou CNPJ (14)" value={s.doc} onChange={setSvc(i,'doc')}/></div><div className="field" style={{marginBottom:8}}><input inputMode="numeric" placeholder="(DDD) número" value={s.tel} onChange={setSvc(i,'tel')}/></div></div>
        <div style={{fontSize:11.5,fontWeight:700,color:'var(--green-800)',margin:'2px 0 6px'}}>Executores (PF) <span className="req-mark">*obrigatório</span></div>
        {s.executores.map((x,j)=>(<div key={j} className="row2" style={{marginBottom:6,alignItems:'center'}}>
          <div className="field" style={{marginBottom:0}}><input placeholder="Nome do executor" value={x.name} onChange={setExec(i,j,'name')}/></div>
          <div className="field" style={{marginBottom:0,position:'relative'}}><input inputMode="numeric" placeholder="CPF" value={x.cpf} onChange={setExec(i,j,'cpf')}/>{s.executores.length>1 && <span onClick={()=>rmExec(i,j)} style={{position:'absolute',right:-4,top:-16,color:'var(--red)',fontSize:11,fontWeight:700,cursor:'pointer'}}>remover</span>}</div>
        </div>))}
        <button className="btn ghost sm" style={{width:'100%',marginTop:4}} onClick={()=>addExec(i)}>+ Adicionar executor</button>
      </div>))}
      <button className="btn ghost sm" style={{width:'100%'}} onClick={()=>setSvcs([...svcs,{servico:'',prestador:'',doc:'',tel:'',executores:[{name:'',cpf:''}]}])}>+ Adicionar prestador</button>
      <div className="hint" style={{margin:'12px 0 0'}}>🕐 Obras: segunda a sexta, das 08h às 18h. Mesmo sendo empresa, informe os profissionais (PF) que vão executar.</div>
    </div></div>
    {err && <div className="err" style={{margin:'0 16px 4px'}}>{err}</div>}
    <div style={{margin:'8px 16px 0'}}><div className={'chk'+(agreed?' on':'')} onClick={()=>{setAgreed(!agreed);setErr('')}}><div className="box">{agreed?'✓':''}</div>
      <div className="txt">Li e <b>concordo com o Termo de Ciência e Responsabilidade</b> e as regras do Regimento Interno aplicáveis a obras. <a onClick={e=>{e.stopPropagation();setRules(true)}}>Ver regras</a></div></div></div>
    <div style={{padding:16,display:'flex',gap:10}}><button className="btn ghost" style={{flex:1}} onClick={onCancel}>Cancelar</button><button className="btn" style={{flex:2}} onClick={submit}>Enviar solicitação</button></div>
    {rules && <RulesModal rules={WORK_RULES} title="Termo e Regras — Obras" onClose={()=>setRules(false)}/>}</>);
}

/* ===== REQ CARD ===== */
function StatusPill({s}){const map={pendente:['st-pend','⏳ Pendente'],aprovada:['st-aprov','✓ Aprovada'],reprovada:['st-reprov','✕ Reprovada']};const [c,l]=map[s]||map.pendente;return <span className={'status '+c}>{l}</span>}
function ReqCard({r,view,actions}){

      <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}><StatusPill s={r.status}/>{r.realizada && <span className="status st-feita">🏁 Realizada</span>}</div></div>

        <div><b>Serviço:</b> {s.servico}</div>

        {s.executores&&s.executores.length>0 && <div style={{marginTop:4}}><b>Executores (PF):</b>{s.executores.map((x,j)=><div key={j} style={{marginLeft:6}}>• {x.name}{x.cpf?(' — CPF '+x.cpf):''}</div>)}</div>}

/* ===== SINDICO ===== */
function Sindico({data,setData,toast,openImg,me,back}){
  const [tab,setTab]=useState('inicio');const [sub,setSub]=useState(null);
  const pendMove=data.moveRequests.filter(r=>r.status==='pendente').length;
  const pendWork=data.workRequests.filter(r=>r.status==='pendente').length;
  const tabs=[{id:'inicio',ic:'🏠',label:'Início'},{id:'mudancas',ic:'🚚',label:'Mudanças',badge:pendMove},{id:'obras',ic:'🔨',label:'Obras',badge:pendWork},{id:'limpeza',ic:'🧽',label:'Limpeza'},{id:'avisos',ic:'📢',label:'Avisos'}];
  const decide=(kind,id,status,note,rejectReason)=>{const key=kind==='move'?'moveRequests':'workRequests';setData(d=>({...d,[key]:d[key].map(r=>r.id===id?{...r,status,note:note||'',rejectReason:rejectReason||''}:r)}));toast(status==='aprovada'?'Solicitação aprovada':'Solicitação reprovada')};
  const go=(t)=>{setSub(null);setTab(t)};
  return (
    <>
      <TopBar title="Painel do Síndico" sub={me.name} roleName={ROLE_LABEL[me.role]} back={back}/>
      <div className="scroll">
        {sub==='areas' ? <AreasManager data={data} setData={setData} toast={toast} back={()=>setSub(null)}/> :
         sub==='equipe' ? <EquipeManager data={data} setData={setData} toast={toast} me={me} back={()=>setSub(null)}/> :
         sub==='chamados' ? <SindicoChamados data={data} setData={setData} toast={toast} openImg={openImg} back={()=>setSub(null)}/> :
         sub==='documentos' ? <DocsManager data={data} setData={setData} toast={toast} back={()=>setSub(null)}/> :
         tab==='inicio' ? <SindicoInicio data={data} setTab={setTab} setSub={setSub}/> :
         tab==='mudancas' ? <SindicoList kind="move" list={data.moveRequests} decide={decide}/> :
         tab==='obras' ? <SindicoList kind="work" list={data.workRequests} decide={decide}/> :
         tab==='limpeza' ? <SindicoLimpeza data={data} openImg={openImg}/> :
         <SindicoAvisos data={data} setData={setData} toast={toast} openImg={openImg}/>}
      </div>
      <Nav tabs={tabs} active={tab} setActive={go}/>
    </>
  );
}
function Shortcut({ic,t,s,on}){return <div className="card" onClick={on}><div className="card-pad" style={{display:'flex',alignItems:'center',gap:13}}><div className="area-ic">{ic}</div><div style={{flex:1}}><div style={{fontWeight:700,color:'var(--green-900)'}}>{t}</div><div style={{fontSize:12.5,color:'var(--muted)'}}>{s}</div></div><span style={{color:'var(--muted)',fontSize:20}}>›</span></div></div>}
function SindicoInicio({data,setTab,setSub}){
  const pm=data.moveRequests.filter(r=>r.status==='pendente').length;const po=data.workRequests.filter(r=>r.status==='pendente').length;
  const aprov=[...data.moveRequests,...data.workRequests].filter(r=>r.status==='aprovada').length;
  const openTk=data.tickets.filter(t=>t.status==='aberto'||t.status==='andamento').length;
  const pendUsers=data.users.filter(u=>u.status==='pendente').length;
  return (<><div className="page-head"><h2>Olá, Síndico 👋</h2><p>Resumo do condomínio hoje</p></div>
    <div className="stat-row"><div className="stat amber"><div className="n">{pm+po}</div><div className="l">Pendentes</div></div><div className="stat"><div className="n">{openTk}</div><div className="l">Chamados</div></div><div className="stat green"><div className="n">{aprov}</div><div className="l">Aprovadas</div></div></div>
    <div className="section-label">Precisa da sua análise</div>
    {pendUsers>0 && <Shortcut ic="🆕" t={pendUsers+" cadastro(s) aguardando aprovação"} s="Aprovar novos moradores" on={()=>setSub('equipe')}/>}
    {pm>0 && <Shortcut ic="🚚" t={pm+" mudança(s) pendente(s)"} s="Toque para revisar" on={()=>setTab('mudancas')}/>}
    {po>0 && <Shortcut ic="🔨" t={po+" obra(s) pendente(s)"} s="Toque para revisar" on={()=>setTab('obras')}/>}
    {openTk>0 && <Shortcut ic="🔧" t={openTk+" chamado(s) de manutenção"} s="Acompanhar e atualizar status" on={()=>setSub('chamados')}/>}
    {pm+po+openTk+pendUsers===0 && <Empty ic="✅" msg="Tudo em dia! Nada pendente."/>}
    <div className="section-label">Gestão</div>
    <Shortcut ic="🔧" t="Chamados de manutenção" s="Ocorrências abertas pelos moradores" on={()=>setSub('chamados')}/>
    <Shortcut ic="📄" t="Documentos" s="Regimento, atas e convenção" on={()=>setSub('documentos')}/>
    <Shortcut ic="🔲" t="Áreas e QR Codes" s="Mapear áreas e gerar os QR Codes" on={()=>setSub('areas')}/>
    <Shortcut ic="👥" t="Equipe e acessos" s="Cadastros, porteiros, subsíndicos, ASG" on={()=>setSub('equipe')}/>
    <Shortcut ic="🧽" t="Serviços da limpeza" s="Ver registros dos ASGs" on={()=>setTab('limpeza')}/>
    <Shortcut ic="📢" t="Publicar comunicado" s="Notifica todos os moradores" on={()=>setTab('avisos')}/>
  </>);
}
function SindicoList({kind,list,decide}){
  const [filter,setFilter]=useState('pendente');const [active,setActive]=useState(null);
  const filtered=list.filter(r=>filter==='todas'?true:r.status===filter);
  return (<><div className="page-head"><h2>{kind==='move'?'Mudanças':'Obras'}</h2><p>Aprove ou reprove as solicitações</p></div>
    <div style={{padding:'0 16px'}}><div className="seg">{[['pendente','Pendentes'],['aprovada','Aprovadas'],['todas','Todas']].map(([v,l])=><button key={v} className={filter===v?'on':''} onClick={()=>setFilter(v)}>{l}</button>)}</div></div>
    <div style={{height:6}}></div>
    {filtered.length===0 ? <Empty ic="📭" msg="Nenhuma solicitação nesta categoria."/> :
      filtered.map(r=>(<ReqCard key={r.id} r={r} view="sindico" actions={r.status==='pendente'?(active&&active.id===r.id?
        <DecidePanel mode={active.mode} onConfirm={(note,reason)=>{decide(kind,r.id,active.mode==='aprovar'?'aprovada':'reprovada',note,reason);setActive(null)}} onCancel={()=>setActive(null)}/>:
        <div style={{display:'flex',gap:9,marginTop:12}}><button className="btn red sm" style={{flex:1}} onClick={()=>setActive({id:r.id,mode:'reprovar'})}>Reprovar</button><button className="btn sm" style={{flex:1}} onClick={()=>setActive({id:r.id,mode:'aprovar'})}>Aprovar</button></div>
      ):null}/>))}</>);
}
function DecidePanel({mode,onConfirm,onCancel}){
  const [txt,setTxt]=useState('');const reprovar=mode==='reprovar';const canConfirm=reprovar?txt.trim().length>=3:true;
  return (<div style={{marginTop:12,background:reprovar?'#fbeeec':'#f6f8f3',borderRadius:11,padding:12}}>
    <div className="field" style={{marginBottom:10}}><label>{reprovar?<>Justificativa da reprovação <span className="req-mark">(obrigatória)</span></>:'Observação para o morador (opcional)'}</label>
      <textarea placeholder={reprovar?'Explique o motivo da reprovação...':'Ex: usar elevador de serviço...'} value={txt} onChange={e=>setTxt(e.target.value)} style={{minHeight:54}}/></div>
    <div style={{display:'flex',gap:9}}><button className="btn ghost sm" style={{flex:1}} onClick={onCancel}>Voltar</button>
      <button className={'btn sm'+(reprovar?' red':'')} style={{flex:1.6,opacity:canConfirm?1:.45}} disabled={!canConfirm} onClick={()=>reprovar?onConfirm('',txt.trim()):onConfirm(txt.trim(),'')}>{reprovar?'Confirmar reprovação':'Confirmar aprovação'}</button></div>
  </div>);
}
function SindicoLimpeza({data,openImg}){
  const areasWithLogs=[...new Set(data.cleaningLogs.map(l=>l.areaId))];

    <div className="stat-row"><div className="stat"><div className="n">{data.cleaningLogs.length}</div><div className="l">Registros</div></div><div className="stat green"><div className="n">{areasWithLogs.length}</div><div className="l">Áreas atendidas</div></div><div className="stat amber"><div className="n">{Math.max(0,data.areas.length-areasWithLogs.length)}</div><div className="l">Sem registro</div></div></div>
    <div className="section-label">Histórico</div>
    {data.cleaningLogs.length===0 ? <Empty ic="🧽" msg="Nenhum serviço registrado ainda."/> :
      data.cleaningLogs.map(l=>(<div key={l.id} className="area-card"><div className="area-ic">{areaIcon(data.areas,l.areaId)}</div>
        <div className="area-info"><div className="an">{l.areaName}</div><div className="at">{l.datetime} · {l.by}</div>
        {l.note && <div className="at" style={{marginTop:2}}>“{l.note}”</div>}
        {l.photos&&l.photos.length>0 && <div className="photo-strip">{l.photos.map((p,i)=><img key={i} src={p} onClick={()=>openImg(p)}/>)}</div>}</div></div>))}</>);
}
function SindicoAvisos({data,setData,toast,openImg}){
  const [t,setT]=useState('');const [body,setBody]=useState('');const [tag,setTag]=useState('info');const [img,setImg]=useState(null);const [saving,setSaving]=useState(false);const fileRef=useRef();
  const onFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>setImg(r.result);r.readAsDataURL(f)};
  const publish=async()=>{if(!t||!body)return;setSaving(true);const image=img?await pushPhoto(img,'comunicados','aviso'):null;const a={id:Date.now(),title:t,text:body,tag,date:nowStr(),author:'Síndico',image};setData(d=>({...d,announcements:[a,...d.announcements]}));setT('');setBody('');setImg(null);setSaving(false);toast('Comunicado publicado e notificado')};
  return (<><div className="page-head"><h2>Novo comunicado</h2><p>Aparece como pop-up para todos os moradores</p></div>
    <div className="card"><div className="card-pad">
      <div className="field"><label>Categoria</label><div className="seg">{[['info','Informe'],['urg','Urgente'],['event','Evento']].map(([v,l])=><button key={v} className={tag===v?'on':''} onClick={()=>setTag(v)}>{l}</button>)}</div></div>
      <div className="field"><label>Título</label><input placeholder="Ex: Manutenção do elevador" value={t} onChange={e=>setT(e.target.value)}/></div>
      <div className="field"><label>Mensagem</label><textarea placeholder="Escreva o comunicado..." value={body} onChange={e=>setBody(e.target.value)}/></div>
      <div className="field"><label>Imagem (opcional)</label><input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
        {img?<div className="photo-prev"><div className="pp"><img src={img}/><button className="x" onClick={()=>setImg(null)}>×</button></div></div>:<div className="add-photo" onClick={()=>fileRef.current.click()}><span className="ic">🖼️</span>Adicionar imagem</div>}</div>
      <button className="btn" disabled={!t||!body||saving} onClick={publish}>{saving?'Publicando…':'Publicar e notificar'}</button>
    </div></div>
    <div className="section-label">Últimos comunicados</div>
    {data.announcements.slice(0,4).map(a=>(<div key={a.id} className="ann"><div className="ann-bar" style={{background:tagColor(a.tag)}}></div>{a.image && <img className="ann-img" src={a.image} onClick={()=>openImg(a.image)}/>}<div className="ann-body"><div className="a-title" style={{fontSize:15}}>{a.title} <span className={'tag '+a.tag}>{tagLabel(a.tag)}</span></div><div className="a-date">{a.date}</div></div></div>))}</>);
}

/* ---- Áreas & QR Codes (gestão do síndico) ---- */
function AreasManager({data,setData,toast,back}){
  const [name,setName]=useState('');const [icon,setIcon]=useState('🏛️');
  const [showQR,setShowQR]=useState(true);
  const add=()=>{if(!name.trim())return;const id=slug(name)+'-'+String(Date.now()).slice(-4);setData(d=>({...d,areas:[...d.areas,{id,name:name.trim(),icon}]}));setName('');setIcon('🏛️');toast('Área adicionada')};
  const remove=(id)=>setData(d=>({...d,areas:d.areas.filter(a=>a.id!==id)}));
  return (<>
    <div className="back-head"><button onClick={back}>‹</button><h2>Áreas e QR Codes</h2></div>
    <div className="hint">🗺️ Mapeie cada área que precisa de limpeza. Ao adicionar uma área, o QR Code é gerado automaticamente e a equipe (ASG) já passa a enxergá-la no acesso dela.</div>
    <div className="card"><div className="card-pad">
      <div className="field"><label>Nome da nova área</label><input placeholder="Ex: Sauna, Hall Torre 3..." value={name} onChange={e=>setName(e.target.value)}/></div>
      <div className="field" style={{marginBottom:8}}><label>Ícone</label><div className="emoji-pick">{EMOJIS.map(e=><button key={e} className={icon===e?'on':''} onClick={()=>setIcon(e)}>{e}</button>)}</div></div>
      <button className="btn" disabled={!name.trim()} onClick={add}>Adicionar área</button>
    </div></div>
    <div className="section-label">Áreas mapeadas ({data.areas.length})</div>
    {data.areas.map(a=>(<div key={a.id} className="area-row"><div className="area-ic" style={{width:40,height:40,fontSize:20}}>{a.icon}</div><div style={{flex:1}}><div className="nm">{a.name}</div><div className="cd">{a.id.toUpperCase()}</div></div><button className="btn red sm" onClick={()=>remove(a.id)}>Excluir</button></div>))}
    <div className="section-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>QR Codes para impressão <button className="btn ghost sm" onClick={()=>setShowQR(s=>!s)}>{showQR?'ocultar':'mostrar'}</button></div>
    {showQR && <div className="qr-grid">{data.areas.map(a=>(<div key={a.id} className="qr-item"><div className="qbox"><QR text={'TORREPASSARE::'+a.id} size={96}/></div><div className="qn">{a.icon} {a.name}</div><div className="qc">{a.id.toUpperCase()}</div></div>))}</div>}
    <div className="hint" style={{marginTop:14}}>🖨️ Imprima e fixe cada QR na sua área. Cada código aponta para o identificador da área (TORREPASSARE::id), lido pelo app da equipe.</div>
    <div style={{height:14}}></div>
  </>);
}
/* ---- Equipe & acessos ---- */
function EquipeManager({data,setData,toast,me,back}){
  const [f,setF]=useState({name:'',email:'',pass:'',cpf:'',role:'porteiro'});const [err,setErr]=useState('');
  const set=k=>e=>{setF({...f,[k]:e.target.value});setErr('')};
  const staff=data.users.filter(u=>u.role!=='morador');
  const add=()=>{
    if(!f.name||!f.email||!f.pass){setErr('Preencha nome, e-mail e senha.');return}
    if(data.users.some(u=>u.email.toLowerCase()===f.email.trim().toLowerCase())){setErr('E-mail já cadastrado.');return}
    if(f.cpf&&digits(f.cpf).length!==11){setErr('CPF inválido (11 dígitos) ou deixe em branco.');return}
    const salt=makeSalt();
    setData(d=>({...d,users:[...d.users,{id:'u'+Date.now(),name:f.name,email:f.email.trim(),cpf:f.cpf?fmtCpf(f.cpf):'',salt,hash:deriveHash(f.pass,salt),role:f.role,apt:'-',torre:'-'}]}));
    setF({name:'',email:'',pass:'',cpf:'',role:'porteiro'});toast('Acesso criado');
  };
  const remove=id=>setData(d=>({...d,users:d.users.filter(u=>u.id!==id)}));
  const approve=id=>{setData(d=>({...d,users:d.users.map(u=>u.id===id?{...u,status:'ativo'}:u)}));toast('Cadastro aprovado')};
  const reject=id=>{setData(d=>({...d,users:d.users.filter(u=>u.id!==id)}));toast('Cadastro recusado')};
  const pendentes=data.users.filter(u=>u.role==='morador'&&u.status==='pendente');
  return (<>
    <div className="back-head"><button onClick={back}>‹</button><h2>Equipe e acessos</h2></div>
    {pendentes.length>0 && <>
      <div className="section-label">🆕 Cadastros aguardando aprovação ({pendentes.length})</div>
      {pendentes.map(u=>(<div key={u.id} className="req-card pend">
        <div className="req-top"><div><div className="who">🏠 {u.name}</div><div className="meta">Apto {u.apt} · Torre {u.torre}</div></div><span className="status st-pend">⏳ Pendente</span></div>
        <div className="req-line"><b>E-mail</b> {u.email}</div>
        <div className="req-line"><b>CPF</b> {u.cpf}</div>
        <div style={{display:'flex',gap:9,marginTop:10}}><button className="btn red sm" style={{flex:1}} onClick={()=>reject(u.id)}>Recusar</button><button className="btn sm" style={{flex:1}} onClick={()=>approve(u.id)}>Aprovar</button></div>
      </div>))}
    </>}
    <div className="hint">👥 Crie logins para porteiros, subsíndicos e equipe de limpeza. Cada um entra com o próprio e-mail e senha.</div>
    <div className="card"><div className="card-pad">
      <div className="field"><label>Função</label><div className="seg">{[['porteiro','Porteiro'],['subsindico','Subsíndico'],['limpeza','ASG']].map(([v,l])=><button key={v} className={f.role===v?'on':''} onClick={()=>setF({...f,role:v})}>{l}</button>)}</div></div>
      {err && <div className="err">{err}</div>}
      <div className="field"><label>Nome</label><input value={f.name} onChange={set('name')} placeholder="Nome completo"/></div>
      <div className="field"><label>E-mail</label><input type="email" value={f.email} onChange={set('email')} placeholder="email@torrepassare.com"/></div>
      <div className="field"><label>CPF (recomendado, p/ recuperar senha)</label><input inputMode="numeric" value={f.cpf} onChange={e=>{setF({...f,cpf:fmtCpf(e.target.value)});setErr('')}} placeholder="000.000.000-00"/></div>
      <div className="field"><label>Senha</label><input value={f.pass} onChange={set('pass')} placeholder="senha inicial"/></div>
      <button className="btn" onClick={add}>Criar acesso</button>
    </div></div>
    <div className="section-label">Acessos ativos ({staff.length})</div>
    {staff.map(u=>(<div key={u.id} className="staff-row"><div className="av">{u.name.charAt(0)}</div>
      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:'var(--green-900)',fontSize:14.5}}>{u.name} {u.id===me.id && <span style={{color:'var(--muted)',fontWeight:500}}>(você)</span>}</div><div style={{fontSize:11.5,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.email}</div></div>
      <span className="role-tag">{ROLE_LABEL[u.role]}</span>
      {u.id!==me.id && <button className="btn red sm" onClick={()=>remove(u.id)}>×</button>}</div>))}
    <div style={{height:14}}></div>
  </>);
}

/* ===== PORTEIRO ===== */
function Porteiro({data,setData,toast,me,back}){
  const [tab,setTab]=useState('agenda');
  const all=[...data.moveRequests,...data.workRequests];
  const aprovadas=all.filter(r=>r.status==='aprovada'&&!r.realizada);
  const feitas=all.filter(r=>r.realizada);const reprovadas=all.filter(r=>r.status==='reprovada');
  const pendPkg=data.packages.filter(p=>p.status==='aguardando').length;
  const pendVis=data.visitors.filter(v=>v.status==='aguardando').length;
  const tabs=[{id:'agenda',ic:'📅',label:'Autorizados'},{id:'visitantes',ic:'🚶',label:'Visitantes',badge:pendVis},{id:'encomendas',ic:'📦',label:'Encomendas',badge:pendPkg},{id:'historico',ic:'🗂️',label:'Histórico'}];
  const register=(kind,id)=>{const key=kind==='move'?'moveRequests':'workRequests';setData(d=>({...d,[key]:d[key].map(r=>r.id===id?{...r,realizada:nowStr()}:r)}));toast('Registrado na portaria')};
  return (<>
    <TopBar title="Portaria" sub={me.name} roleName="Porteiro" back={back}/>
    <div className="scroll">
      {tab==='agenda' && <><div className="page-head"><h2>Liberados para entrada</h2><p>Mudanças e obras aprovadas pelo síndico</p></div>
        {aprovadas.length===0 ? <Empty ic="🚪" msg="Nada autorizado no momento."/> : aprovadas.map(r=>(<ReqCard key={r.id} r={r} view="porteiro" actions={<button className="btn dark sm" style={{width:'100%',marginTop:12}} onClick={()=>register(r.kind,r.id)}>🏁 Registrar {r.kind==='move'?'mudança realizada':'início da obra'}</button>}/>))}
        {reprovadas.length>0 && <><div className="section-label">⛔ Não autorizados (não liberar)</div>{reprovadas.map(r=><ReqCard key={r.id} r={r} view="porteiro"/>)}</>}</>}
      {tab==='visitantes' && <PorteiroVisitantes data={data} setData={setData} toast={toast} me={me}/>}
      {tab==='encomendas' && <PorteiroEncomendas data={data} setData={setData} toast={toast} me={me}/>}
      {tab==='historico' && <><div className="page-head"><h2>Histórico</h2><p>Mudanças e obras registradas</p></div>{feitas.length===0 ? <Empty ic="🗂️" msg="Nenhum registro ainda."/> : feitas.map(r=><ReqCard key={r.id} r={r} view="porteiro"/>)}</>}
    </div>
    <Nav tabs={tabs} active={tab} setActive={setTab}/>
  </>);
}
function PorteiroEncomendas({data,setData,toast,me}){
  const [adding,setAdding]=useState(false);
  const pend=data.packages.filter(p=>p.status==='aguardando');
  const done=data.packages.filter(p=>p.status==='entregue');
  if(adding) return <AddPackage data={data} me={me} onCancel={()=>setAdding(false)} onSave={pkg=>{setData(d=>({...d,packages:[pkg,...d.packages]}));setAdding(false);toast('Encomenda registrada · código enviado ao morador')}}/>;
  const deliverByCode=(id,recipient)=>{setData(d=>({...d,packages:d.packages.map(p=>p.id===id?{...p,status:'entregue',pickedUpBy:recipient,deliveredBy:me.name,pickedUpAt:nowStr()}:p)}));toast('Entrega registrada')};
  const manualPickup=(id,who)=>setData(d=>({...d,packages:d.packages.map(p=>p.id===id?{...p,status:'entregue',pickedUpBy:who+' (registro manual)',deliveredBy:me.name,pickedUpAt:nowStr()}:p)}));
  return (<>
    <div className="page-head"><h2>Encomendas</h2><p>Controle de entrega de correspondências</p></div>
    <div style={{padding:'0 16px'}}><button className="btn" onClick={()=>setAdding(true)}>+ Registrar nova encomenda</button></div>
    <div className="section-label">Aguardando retirada ({pend.length})</div>
    {pend.length===0 ? <Empty ic="📦" msg="Nenhuma encomenda aguardando."/> :
      pend.map(p=>(<div key={p.id} className="pkg-card">
        <div className="req-top"><div><div className="who">📦 {p.recipient}</div><div className="meta">Apto {p.apt} · Torre {p.torre} · {p.carrier}</div></div><span className="status st-pend">⏳ Aguardando</span></div>
        {p.tracking && <div className="req-line"><b>Rastreio</b> {p.tracking}</div>}
        <div className="req-line"><b>Tipo</b> {p.type}</div>
        <div className="hint" style={{margin:'10px 0 0'}}>🔑 Peça ao morador o código que aparece no app dele e digite abaixo para registrar a entrega.</div>
        <PorteiroDeliver pkg={p} onConfirm={()=>deliverByCode(p.id,p.recipient)}/>
        <ManualPickup onConfirm={who=>manualPickup(p.id,who)}/>
      </div>))}
    <div className="section-label">Entregues ({done.length})</div>
    {done.map(p=>(<div key={p.id} className="pkg-card done">
      <div className="req-top"><div><div className="who">📦 {p.recipient}</div><div className="meta">Apto {p.apt} · Torre {p.torre} · {p.carrier}</div></div><span className="status st-feita">✓ Entregue</span></div>
      {p.tracking && <div className="req-line"><b>Rastreio</b> {p.tracking}</div>}
      <div className="note-box" style={{background:'#e6eef7',color:'#2f5d86'}}>Retirada em {p.pickedUpAt} por <b>{p.pickedUpBy}</b>{p.deliveredBy?(' · registrada por '+p.deliveredBy):''}</div></div>))}
    <div style={{height:14}}></div>
  </>);
}
function PorteiroDeliver({pkg,onConfirm}){
  const [open,setOpen]=useState(false);const [code,setCode]=useState('');const [err,setErr]=useState(false);
  if(!open) return <button className="btn dark sm" style={{width:'100%',marginTop:10}} onClick={()=>setOpen(true)}>Registrar entrega (com código do morador)</button>;
  const go=()=>{if(code.trim()===pkg.code)onConfirm();else setErr(true)};
  return (<div style={{marginTop:10,background:'#f6f8f3',borderRadius:11,padding:12}}>
    {err && <div className="err" style={{marginBottom:8}}>Código incorreto. Confira com o morador.</div>}
    <div className="field" style={{marginBottom:10}}><label>Código informado pelo morador</label>
      <input className="otp" inputMode="numeric" maxLength={4} placeholder="0000" value={code} onChange={e=>{setCode(e.target.value.replace(/\D/g,''));setErr(false)}}/></div>
    <div style={{display:'flex',gap:9}}><button className="btn ghost sm" style={{flex:1}} onClick={()=>setOpen(false)}>Voltar</button><button className="btn sm" style={{flex:1.4}} disabled={code.length!==4} onClick={go}>Confirmar entrega</button></div>
  </div>);
}
function ManualPickup({onConfirm}){
  const [open,setOpen]=useState(false);const [who,setWho]=useState('');
  if(!open) return <button className="btn ghost sm" style={{width:'100%',marginTop:8}} onClick={()=>setOpen(true)}>Retirada manual (sem código)</button>;
  return (<div style={{marginTop:8,background:'#f6f8f3',borderRadius:11,padding:12}}>
    <div className="field" style={{marginBottom:10}}><label>Quem retirou? (visitante, empregada, etc.)</label><input value={who} onChange={e=>setWho(e.target.value)} placeholder="Nome de quem retirou"/></div>
    <div style={{display:'flex',gap:9}}><button className="btn ghost sm" style={{flex:1}} onClick={()=>setOpen(false)}>Voltar</button><button className="btn sm" style={{flex:1.4}} disabled={!who.trim()} onClick={()=>onConfirm(who.trim())}>Confirmar retirada</button></div>
    <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Use quando não for o morador retirando. O ideal é registrar com o código do app do morador.</div>
  </div>);
}
function AddPackage({data,me,onCancel,onSave}){
  const [f,setF]=useState({torre:'',apt:'',recipient:'',carrier:'Correios',tracking:'',type:'Caixa'});
  const set=k=>e=>setF({...f,[k]:e.target.value});
  // auto-preenche o nome do morador ao casar torre+apto
  useEffect(()=>{if(f.apt&&f.torre){const u=data.users.find(x=>x.role==='morador'&&x.apt===f.apt&&x.torre===f.torre);if(u&&!f.recipient)setF(s=>({...s,recipient:u.name}))}},[f.apt,f.torre]);
  const valid=f.torre&&f.apt&&f.recipient;
  const save=()=>onSave({id:Date.now(),apt:f.apt,torre:f.torre,recipient:f.recipient,carrier:f.carrier,tracking:f.tracking,type:f.type,code:genCode(),status:'aguardando',registeredBy:me.name,registeredAt:nowStr(),pickedUpBy:null,pickedUpAt:null});
  return (<>
    <div className="back-head"><button onClick={onCancel}>‹</button><h2>Registrar encomenda</h2></div>
    <div className="card"><div className="card-pad">
      <div className="row2"><div className="field"><label>Torre</label><input value={f.torre} onChange={set('torre')} placeholder="1"/></div><div className="field"><label>Apartamento</label><input value={f.apt} onChange={set('apt')} placeholder="304"/></div></div>
      <div className="field"><label>Destinatário</label><input value={f.recipient} onChange={set('recipient')} placeholder="Nome do morador"/></div>
      <div className="row2"><div className="field"><label>Transportadora</label><select value={f.carrier} onChange={set('carrier')}>{['Correios','Mercado Livre','Amazon','Shopee','iFood','Outro'].map(c=><option key={c}>{c}</option>)}</select></div><div className="field"><label>Tipo</label><select value={f.type} onChange={set('type')}>{['Caixa','Envelope','Sacola','Documento','Outro'].map(c=><option key={c}>{c}</option>)}</select></div></div>
      <div className="field"><label>Código de rastreio (opcional)</label><input value={f.tracking} onChange={set('tracking')} placeholder="BR123456789CE"/></div>
      <div className="hint" style={{margin:'0 0 14px'}}>🔑 Ao registrar, o app gera um código de 4 dígitos. Entregue a encomenda e informe o código ao morador, que o digita no app dele para comprovar a retirada.</div>
      <button className="btn" disabled={!valid} onClick={save}>Registrar e gerar código</button>
    </div></div>
  </>);
}

/* ===== LIMPEZA / ASG ===== */
function Limpeza({data,setData,toast,openImg,me,back}){
  const [tab,setTab]=useState('registrar');const [scanned,setScanned]=useState(null);
  const tabs=[{id:'registrar',ic:'📷',label:'Registrar'},{id:'feitos',ic:'✓',label:'Registros'}];
  return (<>
    <TopBar title="Equipe de Limpeza" sub={me.name} roleName="ASG" back={back}/>
    <div className="scroll">
      {tab==='registrar' && (scanned ?
        <RegisterCleaning area={scanned} me={me} onCancel={()=>setScanned(null)} onSave={log=>{setData(d=>({...d,cleaningLogs:[log,...d.cleaningLogs]}));setScanned(null);toast('Serviço registrado')}}/> :
        <ScanArea areas={data.areas} onScan={setScanned}/>)}
      {tab==='feitos' && <CleaningLogs data={data} openImg={openImg}/>}
    </div>
    <Nav tabs={tabs} active={tab} setActive={setTab}/>
  </>);
}
function ScanArea({areas,onScan}){
  return (<><div className="page-head"><h2>Registrar limpeza</h2><p>Leia o QR Code da área para começar</p></div>
    <div className="card"><div className="card-pad" style={{textAlign:'center'}}>
      <div style={{width:130,height:130,margin:'8px auto 14px',border:'3px dashed var(--green-600)',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:54}}>📷</div>
      <div style={{fontSize:13.5,color:'var(--muted)'}}>Aponte a câmera para o QR Code fixado na área.<br/>Para esta demonstração, toque na área abaixo:</div></div></div>
    <div className="section-label">Áreas disponíveis (definidas pelo síndico)</div>
    {areas.length===0 ? <Empty ic="🗺️" msg="O síndico ainda não mapeou áreas."/> :
      areas.map(a=>(<div key={a.id} className="area-card" onClick={()=>onScan(a)} style={{cursor:'pointer',alignItems:'center'}}><div className="area-ic">{a.icon}</div><div className="area-info"><div className="an">{a.name}</div><div className="at">Código: {a.id.toUpperCase()}</div></div><span style={{color:'var(--green-600)',fontSize:22}}>📲</span></div>))}</>);
}
function RegisterCleaning({area,me,onCancel,onSave}){
  const [photos,setPhotos]=useState([]);const [note,setNote]=useState('');const [saving,setSaving]=useState(false);const fileRef=useRef();
  const onFiles=e=>{[...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>setPhotos(p=>[...p,r.result]);r.readAsDataURL(file)})};
  const save=async()=>{setSaving(true);const urls=await pushPhotos(photos,'limpeza','limpeza_'+area.id);onSave({id:Date.now(),areaId:area.id,areaName:area.name,by:me.name,datetime:nowStr(),photos:urls,note})};
  return (<><div className="page-head"><h2>{area.icon} {area.name}</h2><p>Código lido: {area.id.toUpperCase()} · {nowStr()}</p></div>
    <div className="card"><div className="card-pad">
      <div className="hint" style={{margin:'0 0 14px'}}>✓ QR Code reconhecido. Tire fotos do serviço realizado.</div>
      <label style={{fontSize:12.5,fontWeight:700,color:'var(--green-800)',display:'block',marginBottom:8}}>Fotos do serviço</label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={onFiles}/>
      <div className="add-photo" onClick={()=>fileRef.current.click()}><span className="ic">📸</span>Tirar foto / escolher imagem</div>
      {photos.length>0 && <div className="photo-prev">{photos.map((p,i)=>(<div className="pp" key={i}><img src={p}/><button className="x" onClick={()=>setPhotos(photos.filter((_,j)=>j!==i))}>×</button></div>))}</div>}
      <div className="field" style={{marginTop:14}}><label>Observação (opcional)</label><textarea placeholder="Ex: piso lavado, lixeiras trocadas..." value={note} onChange={e=>setNote(e.target.value)}/></div>
    </div></div>
    <div style={{padding:16,display:'flex',gap:10}}><button className="btn ghost" style={{flex:1}} onClick={onCancel} disabled={saving}>Cancelar</button><button className="btn" style={{flex:2}} onClick={save} disabled={saving}>{saving?'Enviando…':'Concluir registro'}</button></div></>);
}
function CleaningLogs({data,openImg}){
  if(data.cleaningLogs.length===0) return <Empty ic="🧽" msg="Nenhum serviço registrado ainda."/>;
  return (<><div className="page-head"><h2>Registros de limpeza</h2><p>Serviços realizados pela equipe</p></div>
    {data.cleaningLogs.map(l=>(<div key={l.id} className="area-card"><div className="area-ic">{areaIcon(data.areas,l.areaId)}</div>
      <div className="area-info"><div className="an">{l.areaName}</div><div className="at">{l.datetime} · {l.by}</div>
      {l.note && <div className="at" style={{marginTop:2}}>“{l.note}”</div>}
      {l.photos&&l.photos.length>0 && <div className="photo-strip">{l.photos.map((p,i)=><img key={i} src={p} onClick={()=>openImg(p)}/>)}</div>}</div></div>))}</>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
